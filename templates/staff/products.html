<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
</head>
<body>

<h2>Products</h2>

<a href="/staff/orders/">View Orders</a>
<br><br>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Price</th>
    </tr>

    {% for product in products %}
    <tr>
        <td>{{ product.id }}</td>
        <td>{{ product.title }}</td>
        <td>{{ product.price }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">No products available</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
