{% load static %}
<link rel="stylesheet" href="{% static 'css/base.css' %}" />

<div class="page-header">
  <h2>Products</h2>
  <div class="btn-group">
    <a href="{% url 'manual_product_upload' %}" class="btn btn-success"
      >+ Create Product</a
    >
    <form method="post" action="{% url 'staff_panel' %}">
      {% csrf_token %}
      <button type="submit" class="btn">← Go Back</button>
    </form>
    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Logout</button>
    </form>
  </div>
</div>

<div class="table-card">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Price</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for product in products %}
      <tr>
        <td><span class="id-badge">{{ product.id }}</span></td>
        <td>{{ product.title }}</td>
        <td class="price">{{ product.price }}</td>
        <td>
          <div class="action-links">
            <a href="{% url 'edit_product' product.id %}" class="edit-link"
              >✏️ Edit</a
            >
            <a href="{% url 'delete_product' product.id %}" class="delete-link"
              >🗑️ Delete</a
            >
          </div>
        </td>
      </tr>
      {% empty %}
      <tr class="empty-row">
        <td colspan="4">No products available</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
