<!DOCTYPE html>
<html>
<head>
    <title>Orders</title>
</head>
<body>

<h2>Orders</h2>


<form method="post" action="{% url 'staff_panel' %}" style="display:inline;">
    {% csrf_token %}
    <button type="submit">Go Back</button></form>
<form method="post" action="{% url 'logout' %}" style="display:inline;">
    {% csrf_token %}
    <button type="submit">Logout</button>
</form>

<br><br>

<table border="1" cellpadding="8">
    <tr>
        <th>Shopify ID</th>
        <th>Email</th>
        <th>Total Price</th>
    </tr>

    {% for order in orders %}
    <tr>
        <td>{{ order.shopify_order_id }}</td>
        <td>{{ order.email }}</td>
        <td>{{ order.total_price }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">No orders available</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
