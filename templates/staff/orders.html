<!DOCTYPE html>
<html>
<head>
    <title>Orders</title>
</head>
<body>

<h2>Orders</h2>

<a href="/staff/products/">View Products</a>
<br><br>

<table border="1">
    <tr>
        <th>Shopify ID</th>
        <th>Email</th>
        <th>Total Price</th>
    </tr>

    {% for order in orders %}
    <tr>
        <td>{{ order.shopify_order_id }}</td>
        <td>{{ order.email }}</td>
        <td>{{ order.total_price }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">No orders available</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
