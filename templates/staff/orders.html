{% load static %}
<link rel="stylesheet" href="{% static 'css/base.css' %}">

<div class="page-header">
  <h2>Orders</h2>
  <div class="btn-group">
    <form method="post" action="{% url 'staff_panel' %}">
      {% csrf_token %}
      <button type="submit" class="btn">← Go Back</button>
    </form>
    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Logout</button>
    </form>
  </div>
</div>

<div class="table-card">
  <table>
    <thead>
      <tr>
        <th>Shopify ID</th>
        <th>Email</th>
        <th>Total Price</th>
      </tr>
    </thead>
    <tbody>
      {% for order in orders %}
      <tr>
        <td>{{ order.shopify_order_id }}</td>
        <td>{{ order.email }}</td>
        <td class="price">{{ order.total_price }}</td>
      </tr>
      {% empty %}
      <tr class="empty-row">
        <td colspan="3">No orders available</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
