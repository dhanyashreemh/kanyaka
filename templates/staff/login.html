{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Staff Login</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}" />
    <link rel="stylesheet" href="{% static 'css/login.css' %}" />
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-icon">💍</div>
        <h2>Staff Login</h2>
        <p class="subtitle">Gold Rate Management System</p>

        {% if form.errors %}
        <div class="error-box">⚠️ Invalid username or password.</div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}

          <div class="field">
            <label>Username</label>
            <input
              type="text"
              name="username"
              required
              autocomplete="username"
            />
          </div>

          <div class="field">
            <label>Password</label>
            <input
              type="password"
              name="password"
              required
              autocomplete="current-password"
            />
          </div>

          <button type="submit" class="btn btn-success login-btn">
            🔐 Login
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
