{% load static %}
<link rel="stylesheet" href="{% static 'css/base.css' %}" />

<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .btn-group form {
    width: 100%;
  }
</style>

<div class="delete-card">
  <span class="warning-icon">🗑️</span>
  <h2>Delete Product</h2>
  <hr />
  <p>
    Are you sure you want to delete
    <strong>"{{ product.title }}"</strong>?<br />This action cannot be undone.
  </p>

  <div class="btn-group">
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-delete">Yes, Delete</button>
    </form>

    <div class="btn-row">
      <form method="post" action="{% url 'staff_products' %}" style="flex: 1">
        {% csrf_token %}
        <button type="submit" class="btn btn-cancel" style="width: 100%">
          ← Cancel
        </button>
      </form>
      <form method="post" action="{% url 'staff_panel' %}" style="flex: 1">
        {% csrf_token %}
        <button type="submit" class="btn" style="width: 100%">
          🏠 Staff Panel
        </button>
      </form>
    </div>

    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger" style="width: 100%">
        🚪 Logout
      </button>
    </form>
  </div>
</div>
