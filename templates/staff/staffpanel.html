{% load static %}
<link rel="stylesheet" href="{% static 'css/base.css' %}" />

<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .panel-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 40px 48px;
    width: 100%;
    max-width: 420px;
  }

  .panel-wrapper h2 {
    margin-bottom: 6px;
  }

  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0 24px;
  }

  .panel-wrapper .btn {
    display: flex; /* full width, stacked */
    width: 100%;
    margin-bottom: 10px;
  }

  .panel-wrapper form {
    width: 100%;
  }
</style>

<div class="panel-wrapper">
  <h2>Staff Panel</h2>
  <hr />

  <a class="btn" href="{% url 'dashboard' %}">💰 Update Gold Rate</a>
  <a class="btn" href="{% url 'manual_product_upload' %}"
    >📦 Upload Product (Manual)</a
  >
  <a class="btn" href="{% url 'bulk_product_upload' %}"
    >📂 Upload Products (CSV)</a
  >
  <a class="btn" href="{% url 'staff_orders' %}">🛍️ View Orders</a>
  <a class="btn" href="{% url 'staff_products' %}">💍 View Products</a>

  <form method="post" action="{% url 'logout' %}">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit" style="margin-bottom: 0">
      🚪 Logout
    </button>
  </form>
</div>
