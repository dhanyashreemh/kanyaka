<h2>Edit Product</h2>

<form method="post">
    {% csrf_token %}
    Title: <input type="text" name="title" value="{{ product.title }}"><br><br>
    Price: <input type="number" step="0.01" name="price" value="{{ product.price }}"><br><br>
    <button type="submit">Update</button>
</form>

<br>
<a href="{% url 'staff_products' %}">Back</a>
